<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA WC 2026 - Test Suite Visual Reporter</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Custom overrides for test dashboard */
    .tests-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: var(--panel-gap);
      height: calc(100vh - var(--header-height) - 40px);
      margin: 20px;
    }
    .test-card-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition-smooth);
    }
    .test-card-item:hover {
      border-color: rgba(0, 240, 255, 0.2);
      background: rgba(0, 240, 255, 0.01);
    }
    .test-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .test-title-text {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
    }
    .test-desc-text {
      font-size: 11px;
      color: var(--text-muted);
    }
    .test-badge {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      min-width: 70px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }
    .test-badge.pass {
      background: rgba(0, 255, 163, 0.1);
      color: var(--neon-emerald);
      border-color: rgba(0, 255, 163, 0.2);
    }
    .test-badge.fail {
      background: rgba(255, 46, 147, 0.1);
      color: var(--neon-crimson);
      border-color: rgba(255, 46, 147, 0.2);
    }
    .test-badge.running {
      background: rgba(0, 240, 255, 0.1);
      color: var(--neon-cyan);
      border-color: rgba(0, 240, 255, 0.2);
      animation: pulse-glow 1s infinite;
    }
    .test-stats-hero {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(0, 255, 163, 0.03));
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: var(--panel-gap);
      text-align: center;
    }
    .stats-percentage {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 800;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px var(--neon-cyan-glow);
    }
    .stats-summary-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .test-error-log {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: var(--neon-crimson);
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.2);
      padding: 6px;
      border-radius: 4px;
      border: 1px solid rgba(255, 46, 147, 0.15);
    }
  </style>
</head>
<body>
  <div class="ambient-glow bg-glow-1"></div>
  <div class="ambient-glow bg-glow-2"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        <h1>FIFA WC 2026</h1>
        <p class="subtitle">AUTOMATED TESTING FRAMEWORK</p>
      </div>
    </div>
    <div class="header-actions">
      <a href="index.html" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Dashboard
      </a>
      <button class="btn btn-primary" id="run-tests-btn" onclick="startTestsExecution()">
        Run Assertion Suite
      </button>
    </div>
  </header>

  <!-- Main Grid -->
  <div class="tests-grid">
    <!-- LEFT PANEL: Test Assertions List -->
    <section class="card glass-card scroll-panel">
      <div class="card-header">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
          <h3>Automated Assertions Checklist</h3>
        </div>
        <div class="status-badge" id="suite-status">READY</div>
      </div>
      <div class="card-body scroll-body" id="test-list-container">
        <!-- Tests will be loaded here dynamically -->
      </div>
    </section>

    <!-- RIGHT PANEL: Test Stats & Environment Outputs -->
    <section class="grid-panel" aria-label="Test stats panel">
      <!-- Big Stats Card -->
      <div class="test-stats-hero">
        <div class="stats-percentage" id="stats-percentage-label">--%</div>
        <div class="stats-summary-text" id="stats-summary-label">Idle. Awaiting execution.</div>
        <div class="playback-progress-bar mt-3">
          <div class="progress-fill" id="test-progress-fill" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Mini Live Telemetry Sandbox (Required by app.js functions during test execution) -->
      <div class="card glass-card scroll-panel">
        <div class="card-header">
          <div class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
            <h3>Mock Telemetry Bindings</h3>
          </div>
        </div>
        <div class="card-body" style="padding:10px">
          <!-- Hidden/Mock DOM Nodes so app.js doesn't throw null errors -->
          <div class="kpi-grid" style="grid-template-columns: 1fr 1fr; gap: 8px;">
            <div class="kpi-card glass-card" style="padding:6px 10px">
              <div class="kpi-label" style="font-size:9px">Sim Clock</div>
              <div class="kpi-value" style="font-size:14px" id="sim-clock">16:50:50</div>
            </div>
            <div class="kpi-card glass-card" style="padding:6px 10px">
              <div class="kpi-label" style="font-size:9px">Avg Queue</div>
              <div class="kpi-value" style="font-size:14px" id="kpi-queue-time">0.0 min</div>
            </div>
            <div class="kpi-card glass-card" style="padding:6px 10px">
              <div class="kpi-label" style="font-size:9px">Total Inflow</div>
              <div class="kpi-value" style="font-size:14px" id="kpi-inflow-rate">0 p/m</div>
            </div>
            <div class="kpi-card glass-card" style="padding:6px 10px">
              <div class="kpi-label" style="font-size:9px">Incidents</div>
              <div class="kpi-value" style="font-size:14px" id="kpi-incidents">0</div>
            </div>
          </div>
          
          <!-- Hidden Elements required by XAI / Broadcast / Phone / CSV / Map -->
          <div class="hidden">
            <span id="kpi-occupancy"></span>
            <span id="kpi-incidents-trend"></span>
            <span id="phone-val-queue"></span>
            <span id="phone-val-flow"></span>
            <div id="xai-recommendations-container"></div>
            <textarea id="broadcast-textarea"></textarea>
            <button id="decline-alert-btn"></button>
            <button id="broadcast-alert-btn"></button>
            <div id="phone-broadcast-toast"></div>
            <p id="phone-toast-msg"></p>
            <div id="volunteer-chat-history"></div>
            <input id="volunteer-chat-input">
            <div id="global-toast-container"></div>
            
            <div id="lang-tab-en"></div>
            <div id="lang-tab-es"></div>
            <div id="lang-tab-fr"></div>
            <div id="stadium-map-wrapper"></div>
            
            <div id="csv-playback-console"></div>
            <div id="sim-status-badge"></div>
            <div id="playback-progress-fill"></div>
            <div id="playback-line-count"></div>
            <div id="playback-anomaly-count"></div>
            <div id="csv-log-box"></div>
            <div id="csv-file-name"></div>
            
            <div id="gate-group-A"></div>
            <div id="gate-outer-A"></div>
            <div id="gate-group-B"></div>
            <div id="gate-outer-B"></div>
            <div id="gate-group-C"></div>
            <div id="gate-outer-C"></div>
            <div id="gate-group-D"></div>
            <div id="gate-outer-D"></div>
            
            <div id="corridor-north"></div>
            <div id="corridor-south"></div>
            <div id="corridor-east"></div>
            <div id="corridor-west"></div>
            
            <div id="zone-1"></div>
            <div id="zone-2"></div>
            <div id="zone-3"></div>
            <div id="zone-4"></div>
          </div>
        </div>
      </div>

      <!-- Test Log Terminal -->
      <div class="card glass-card flex-grow scroll-panel">
        <div class="card-header">
          <div class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange"><path d="M4 17h16M4 12h16M4 7h16"/></svg>
            <h3>Execution Trace</h3>
          </div>
        </div>
        <div class="card-body p-0 log-body">
          <div id="live-incident-log" class="terminal-log">
            <!-- Test engine output lines -->
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
  <script src="tests.js"></script>
  <script>
    // Visual Runner Logic
    let testList = [];

    document.addEventListener("DOMContentLoaded", () => {
      // Suspend default ticks so test asserts don't get interrupted
      clearInterval(appState.simIntervalId);
      
      // Load tests list into view
      testList = (window.testSuite && window.testSuite.tests) || [];
      renderTestsChecklist();
      
      // Auto run on load
      setTimeout(() => {
        startTestsExecution();
      }, 500);
    });

    function renderTestsChecklist() {
      const container = document.getElementById("test-list-container");
      if (!container) return;
      container.innerHTML = "";
      
      testList.forEach((test, idx) => {
        container.innerHTML += `
          <div class="test-card-item" id="test-card-${idx}">
            <div class="test-info">
              <span class="test-title-text">${test.name}</span>
              <span class="test-desc-text">${test.description}</span>
              <div class="test-error-log hidden" id="test-error-${idx}"></div>
            </div>
            <span class="test-badge" id="test-badge-${idx}">IDLE</span>
          </div>
        `;
      });
    }

    function startTestsExecution() {
      // Re-read from suite in case it loaded slightly later
      testList = (window.testSuite && window.testSuite.tests) || [];
      renderTestsChecklist(); // reset UI
      
      const statusBadge = document.getElementById("suite-status");
      if (statusBadge) {
        statusBadge.innerText = "RUNNING";
        statusBadge.className = "status-badge";
        statusBadge.style.backgroundColor = "rgba(0, 240, 255, 0.1)";
        statusBadge.style.borderColor = "var(--neon-cyan)";
        statusBadge.style.color = "var(--neon-cyan)";
      }

      const progressFill = document.getElementById("test-progress-fill");
      const percentageLabel = document.getElementById("stats-percentage-label");
      const summaryLabel = document.getElementById("stats-summary-label");
      const logBox = document.getElementById("live-incident-log");
      
      if (logBox) logBox.innerHTML = "";
      if (progressFill) progressFill.style.width = "0%";
      if (percentageLabel) percentageLabel.innerText = "0%";
      if (summaryLabel) summaryLabel.innerText = "Running tests...";

      let counter = 0;

      if (typeof window.runTestSuite !== 'function') {
        if (summaryLabel) summaryLabel.innerText = "Failed: runTestSuite function is not defined.";
        return;
      }

      window.runTestSuite(
        // Completion callback per test
        (res) => {
          const idx = testList.findIndex(t => t.name === res.name);
          if (idx === -1) {
            addLogEntry('TEST_ERR', `Test name mismatch: ${res.name}`, 'error');
            return;
          }
          const badge = document.getElementById(`test-badge-${idx}`);
          
          counter++;
          const progressPercent = (counter / testList.length) * 100;
          if (progressFill) progressFill.style.width = `${progressPercent}%`;
          if (percentageLabel) percentageLabel.innerText = `${Math.round(progressPercent)}%`;

          if (res.success) {
            if (badge) {
              badge.innerText = "PASSED";
              badge.className = "test-badge pass";
            }
            addLogEntry('PASS', `${res.name} completed successfully.`, 'success');
          } else {
            if (badge) {
              badge.innerText = "FAILED";
              badge.className = "test-badge fail";
            }
            
            const errBox = document.getElementById(`test-error-${idx}`);
            if (errBox) {
              errBox.innerText = `Error: ${res.error}`;
              errBox.classList.remove("hidden");
            }
            
            addLogEntry('FAIL', `${res.name} failed: ${res.error}`, 'error');
          }
        },
        // Complete execution summary callback
        (summary) => {
          const statusBadge = document.getElementById("suite-status");
          
          if (summary.failed === 0) {
            if (statusBadge) {
              statusBadge.innerText = "ALL PASSED";
              statusBadge.style.backgroundColor = "rgba(0, 255, 163, 0.1)";
              statusBadge.style.borderColor = "var(--neon-emerald)";
              statusBadge.style.color = "var(--neon-emerald)";
            }
            if (summaryLabel) summaryLabel.innerText = `${summary.passed}/${summary.total} assertions passed. Environment stable.`;
            addLogEntry('TEST SUITE', `All ${summary.total} checks passed successfully. 100% compliance.`, 'success');
          } else {
            if (statusBadge) {
              statusBadge.innerText = "FAILURES";
              statusBadge.style.backgroundColor = "rgba(255, 46, 147, 0.1)";
              statusBadge.style.borderColor = "var(--neon-crimson)";
              statusBadge.style.color = "var(--neon-crimson)";
            }
            if (summaryLabel) summaryLabel.innerText = `${summary.failed} failures encountered. Adjust code.`;
            addLogEntry('TEST SUITE', `Suite completed with ${summary.failed} failures. Review trace details.`, 'error');
          }
        }
      );
    }
  </script>
</body>
</html>
