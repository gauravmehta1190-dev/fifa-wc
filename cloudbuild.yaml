# GCP Cloud Build configuration pipeline to automate deployment to Google Cloud Run
steps:
  # Step 1: Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fifa-repo/crowd-management:$SHORT_SHA'
      - '.'

  # Step 2: Push the image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fifa-repo/crowd-management:$SHORT_SHA'

  # Step 3: Deploy container to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fifa-crowd-management'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/fifa-repo/crowd-management:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Specify target Artifact Registry image paths for build references
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fifa-repo/crowd-management:$SHORT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
